<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <button type="button" class="btn btn-primary" id="showToastBtn">
        Show toast
      </button>
      <button type="button" class="btn btn-secondary" id="showStickyBtn">
        Show sticky toast
      </button>

      <div
        class="toast mt-3"
        id="basicToast"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <div class="toast-header">
          <svg
            class="rounded me-2"
            width="20"
            height="20"
            xmlns="http://www.w3.org/2000/svg"
            focusable="false"
          >
            <rect width="100%" height="100%" fill="#007aff"></rect>
          </svg>
          <strong class="me-auto">Bootstrap</strong>
          <small class="text-muted">11 mins ago</small>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="toast"
            aria-label="Close"
          ></button>
        </div>
        <div class="toast-body">
          Hello, world! This is a toast message. It auto-hides after 5 seconds.
        </div>
      </div>
      <div
        class="toast mt-3"
        id="stickyToast"
        data-bs-autohide="false"
        role="alert"
        aria-live="assertive"
        aria-atomic="true"
      >
        <div class="toast-header">
          <strong class="me-auto">Sticky toast</strong>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="toast"
            aria-label="Close"
          ></button>
        </div>
        <div class="toast-body">
          I stay until you dismiss me (data-bs-autohide="false").
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const basicToast = new bootstrap.Toast(
        document.getElementById("basicToast"),
      );
      const stickyToast = new bootstrap.Toast(
        document.getElementById("stickyToast"),
      );

      document
        .getElementById("showToastBtn")
        .addEventListener("click", () => basicToast.show());
      document
        .getElementById("showStickyBtn")
        .addEventListener("click", () => stickyToast.show());
    </script>
  </body>
</html>
