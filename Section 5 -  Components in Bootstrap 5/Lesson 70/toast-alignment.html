<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <button type="button" class="btn btn-primary" id="showCornerBtn">
        Toast top-right
      </button>
      <button type="button" class="btn btn-secondary" id="showCenterBtn">
        Toast top-center
      </button>
      <button type="button" class="btn btn-success" id="showStackBtn">
        Stacked toasts (bottom-right)
      </button>

      <!-- Top right -->
      <div class="toast-container position-fixed top-0 end-0 p-3">
        <div
          class="toast"
          id="cornerToast"
          role="alert"
          aria-live="assertive"
          aria-atomic="true"
        >
          <div class="toast-header">
            <strong class="me-auto">Top right</strong>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="toast"
              aria-label="Close"
            ></button>
          </div>
          <div class="toast-body">position-fixed top-0 end-0</div>
        </div>
      </div>

      <!-- Top center -->
      <div
        class="toast-container position-fixed top-0 start-50 translate-middle-x p-3"
      >
        <div
          class="toast"
          id="centerToast"
          role="alert"
          aria-live="assertive"
          aria-atomic="true"
        >
          <div class="toast-header">
            <strong class="me-auto">Top center</strong>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="toast"
              aria-label="Close"
            ></button>
          </div>
          <div class="toast-body">
            start-50 + translate-middle-x centers it.
          </div>
        </div>
      </div>

      <!-- Bottom right, stacked -->
      <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div
          class="toast"
          id="stackToast1"
          role="alert"
          aria-live="assertive"
          aria-atomic="true"
        >
          <div class="toast-header">
            <strong class="me-auto">First toast</strong>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="toast"
              aria-label="Close"
            ></button>
          </div>
          <div class="toast-body">Toasts in the same container stack.</div>
        </div>
        <div
          class="toast"
          id="stackToast2"
          role="alert"
          aria-live="assertive"
          aria-atomic="true"
        >
          <div class="toast-header">
            <strong class="me-auto">Second toast</strong>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="toast"
              aria-label="Close"
            ></button>
          </div>
          <div class="toast-body">See? Right below the first one.</div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const cornerToast = new bootstrap.Toast(
        document.getElementById("cornerToast"),
      );
      const centerToast = new bootstrap.Toast(
        document.getElementById("centerToast"),
      );
      const stackToast1 = new bootstrap.Toast(
        document.getElementById("stackToast1"),
      );
      const stackToast2 = new bootstrap.Toast(
        document.getElementById("stackToast2"),
      );

      document
        .getElementById("showCornerBtn")
        .addEventListener("click", () => cornerToast.show());
      document
        .getElementById("showCenterBtn")
        .addEventListener("click", () => centerToast.show());
      document.getElementById("showStackBtn").addEventListener("click", () => {
        stackToast1.show();
        stackToast2.show();
      });
    </script>
  </body>
</html>
