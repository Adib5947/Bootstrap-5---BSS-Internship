<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <div class="row">
        <div class="col-4">
          <nav
            id="sectionNav"
            class="navbar navbar-light bg-light flex-column align-items-stretch p-3"
          >
            <nav class="nav nav-pills flex-column">
              <a class="nav-link" href="#item-1">Item 1</a>
              <a class="nav-link" href="#item-2">Item 2</a>
              <a class="nav-link" href="#item-3">Item 3</a>
              <nav class="nav nav-pills flex-column">
                <a class="nav-link ms-3 my-1" href="#item-3-1">Item 3-1</a>
                <a class="nav-link ms-3 my-1" href="#item-3-2">Item 3-2</a>
              </nav>
            </nav>
          </nav>
        </div>

        <div class="col-8">
          <div
            data-bs-spy="scroll"
            data-bs-target="#sectionNav"
            data-bs-smooth-scroll="true"
            class="position-relative overflow-auto"
            style="height: 350px"
            tabindex="0"
          >
            <h4 id="item-1">Item 1</h4>
            <p style="margin-bottom: 200px">
              Content for item 1. Scroll down and watch the left nav highlight
              follow you.
            </p>
            <h4 id="item-2">Item 2</h4>
            <p style="margin-bottom: 200px">Content for item 2.</p>
            <h4 id="item-3">Item 3</h4>
            <p style="margin-bottom: 120px">Content for item 3.</p>
            <h5 id="item-3-1">Item 3-1</h5>
            <p style="margin-bottom: 200px">Nested sub-section 3-1.</p>
            <h5 id="item-3-2">Item 3-2</h5>
            <p style="margin-bottom: 300px">Nested sub-section 3-2.</p>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
