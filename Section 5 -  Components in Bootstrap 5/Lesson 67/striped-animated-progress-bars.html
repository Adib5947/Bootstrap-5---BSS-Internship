<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5.3</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>Striped, all colors</h5>
      <div
        class="progress mb-2"
        role="progressbar"
        aria-label="Default striped"
        aria-valuenow="10"
        aria-valuemin="0"
        aria-valuemax="100"
      >
        <div class="progress-bar progress-bar-striped" style="width: 10%"></div>
      </div>
      <div
        class="progress mb-2"
        role="progressbar"
        aria-label="Success striped"
        aria-valuenow="25"
        aria-valuemin="0"
        aria-valuemax="100"
      >
        <div
          class="progress-bar progress-bar-striped bg-success"
          style="width: 25%"
        ></div>
      </div>
      <div
        class="progress mb-2"
        role="progressbar"
        aria-label="Info striped"
        aria-valuenow="50"
        aria-valuemin="0"
        aria-valuemax="100"
      >
        <div
          class="progress-bar progress-bar-striped bg-info"
          style="width: 50%"
        ></div>
      </div>
      <div
        class="progress mb-2"
        role="progressbar"
        aria-label="Warning striped"
        aria-valuenow="75"
        aria-valuemin="0"
        aria-valuemax="100"
      >
        <div
          class="progress-bar progress-bar-striped bg-warning"
          style="width: 75%"
        ></div>
      </div>
      <div
        class="progress mb-2"
        role="progressbar"
        aria-label="Danger striped"
        aria-valuenow="100"
        aria-valuemin="0"
        aria-valuemax="100"
      >
        <div
          class="progress-bar progress-bar-striped bg-danger"
          style="width: 100%"
        ></div>
      </div>

      <h5 class="mt-4">Animated stripes</h5>
      <div
        class="progress"
        role="progressbar"
        aria-label="Animated striped"
        aria-valuenow="75"
        aria-valuemin="0"
        aria-valuemax="100"
      >
        <div
          class="progress-bar progress-bar-striped progress-bar-animated"
          style="width: 75%"
        ></div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
