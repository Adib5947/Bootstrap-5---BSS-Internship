<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5.3</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>Inline style heights (new markup)</h5>
      <div
        class="progress mb-2"
        role="progressbar"
        aria-label="1px high"
        aria-valuenow="25"
        aria-valuemin="0"
        aria-valuemax="100"
        style="height: 1px"
      >
        <div class="progress-bar" style="width: 25%"></div>
      </div>
      <div
        class="progress mb-2"
        role="progressbar"
        aria-label="10px high"
        aria-valuenow="25"
        aria-valuemin="0"
        aria-valuemax="100"
        style="height: 10px"
      >
        <div class="progress-bar" style="width: 25%"></div>
      </div>
      <div
        class="progress mb-2"
        role="progressbar"
        aria-label="30px high"
        aria-valuenow="25"
        aria-valuemin="0"
        aria-valuemax="100"
        style="height: 30px"
      >
        <div class="progress-bar" style="width: 25%">25%</div>
      </div>

      <h5 class="mt-4">Via CSS variable</h5>
      <div
        class="progress"
        role="progressbar"
        aria-label="CSS variable height"
        aria-valuenow="60"
        aria-valuemin="0"
        aria-valuemax="100"
        style="--bs-progress-height: 2rem"
      >
        <div class="progress-bar bg-success" style="width: 60%">60%</div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
