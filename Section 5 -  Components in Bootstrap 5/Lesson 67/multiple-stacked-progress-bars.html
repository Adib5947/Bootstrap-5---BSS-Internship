<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5.3</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>Stacked segments</h5>
      <div class="progress-stacked mb-4">
        <div
          class="progress"
          role="progressbar"
          aria-label="Segment one"
          aria-valuenow="15"
          aria-valuemin="0"
          aria-valuemax="100"
          style="width: 15%"
        >
          <div class="progress-bar">15%</div>
        </div>
        <div
          class="progress"
          role="progressbar"
          aria-label="Segment two"
          aria-valuenow="30"
          aria-valuemin="0"
          aria-valuemax="100"
          style="width: 30%"
        >
          <div class="progress-bar bg-success">30%</div>
        </div>
        <div
          class="progress"
          role="progressbar"
          aria-label="Segment three"
          aria-valuenow="20"
          aria-valuemin="0"
          aria-valuemax="100"
          style="width: 20%"
        >
          <div class="progress-bar bg-danger">20%</div>
        </div>
      </div>

      <h5>Mixed styles per segment</h5>
      <div class="progress-stacked">
        <div
          class="progress"
          role="progressbar"
          aria-label="Plain"
          aria-valuenow="25"
          aria-valuemin="0"
          aria-valuemax="100"
          style="width: 25%"
        >
          <div class="progress-bar"></div>
        </div>
        <div
          class="progress"
          role="progressbar"
          aria-label="Striped"
          aria-valuenow="25"
          aria-valuemin="0"
          aria-valuemax="100"
          style="width: 25%"
        >
          <div class="progress-bar progress-bar-striped bg-warning"></div>
        </div>
        <div
          class="progress"
          role="progressbar"
          aria-label="Animated"
          aria-valuenow="25"
          aria-valuemin="0"
          aria-valuemax="100"
          style="width: 25%"
        >
          <div
            class="progress-bar progress-bar-striped progress-bar-animated bg-info"
          ></div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
