<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <nav class="navbar navbar-light bg-light mb-3">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">container-fluid inside</a>
      </div>
    </nav>

    <nav class="navbar navbar-light bg-light mb-3">
      <div class="container">
        <a class="navbar-brand" href="#">container inside (content centered)</a>
      </div>
    </nav>

    <div class="container mb-3">
      <nav class="navbar navbar-light bg-light">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">navbar wrapped in a container</a>
        </div>
      </nav>
    </div>

    <nav class="navbar navbar-light bg-light">
      <div class="container-md">
        <a class="navbar-brand" href="#">container-md inside</a>
      </div>
    </nav>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
