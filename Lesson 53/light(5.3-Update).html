<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div
            id="slides-with-indicators"
            class="carousel slide"
            data-bs-touch="false"
            data-bs-interval="false"
            data-bs-theme="white"
          >
            <div class="carousel-indicators">
              <button
                class="active"
                type="button"
                data-bs-target="#slides-with-indicators"
                data-bs-slide-to="0"
                aria-current="true"
                aria-label="Slide 1"
              ></button>

              <button
                class="active"
                type="button"
                data-bs-target="#slides-with-indicators"
                data-bs-slide-to="1"
                aria-current="true"
                aria-label="Slide 2"
              ></button>

              <button
                class="active"
                type="button"
                data-bs-target="#slides-with-indicators"
                data-bs-slide-to="2"
                aria-current="true"
                aria-label="Slide 3"
              ></button>
            </div>
            <div class="carousel-inner">
              <div class="carousel-item active">
                <img
                  class="d-block w-100"
                  src="https://images.unsplash.com/photo-1421789665209-c9b2a435e3dc?q=80&w=1171&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                  alt=""
                />
                <div class="carousel-caption d-none d-md-block">
                  <h5>First Carousel Caption</h5>
                  <p>
                    Lorem ipsum dolor sit amet consectetur adipisicing elit.
                    Eaque, odit!
                  </p>
                </div>
              </div>

              <div class="carousel-item">
                <img
                  class="d-block w-100"
                  src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?q=80&w=1174&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                  alt=""
                />
                <div class="carousel-caption d-none d-md-block">
                  <h5>Second Carousel Caption</h5>
                  <p>
                    Lorem ipsum dolor sit amet consectetur adipisicing elit.
                    Eaque, odit!
                  </p>
                </div>
              </div>

              <div class="carousel-item">
                <img
                  class="d-block w-100"
                  src="https://plus.unsplash.com/premium_photo-1719943510748-4b4354fbcf56?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                  alt=""
                />
                <div class="carousel-caption d-none d-md-block">
                  <h5>Third Carousel Caption</h5>
                  <p>
                    Lorem ipsum dolor sit amet consectetur adipisicing elit.
                    Eaque, odit!
                  </p>
                </div>
              </div>
            </div>
            <button
              class="carousel-control-prev"
              type="button"
              data-bs-target="#slides-with-indicators"
              data-bs-slide="prev"
            >
              <span
                class="carousel-control-prev-icon"
                aria-hidden="true"
              ></span>
              <span class="visually-hidden">Previous</span>
            </button>

            <button
              class="carousel-control-next"
              type="button"
              data-bs-target="#slides-with-indicators"
              data-bs-slide="next"
            >
              <span
                class="carousel-control-next-icon"
                aria-hidden="true"
              ></span>
              <span class="visually-hidden">Next</span>
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
