<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5.3</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <nav class="navbar bg-primary mb-3" data-bs-theme="dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">bg-primary + dark theme</a>
      </div>
    </nav>

    <nav class="navbar bg-success mb-3" data-bs-theme="dark">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">bg-success + dark theme</a>
      </div>
    </nav>

    <nav class="navbar bg-warning mb-3" data-bs-theme="light">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">bg-warning + light theme</a>
      </div>
    </nav>

    <nav
      class="navbar mb-3"
      style="background-color: #6f42c1"
      data-bs-theme="dark"
    >
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Custom purple + dark theme</a>
      </div>
    </nav>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
