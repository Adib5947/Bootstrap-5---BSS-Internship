<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5.3</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>Default focus ring (press Tab)</h5>
      <p>
        <a
          href="#"
          class="focus-ring px-2 link-offset-2 link-underline link-underline-opacity-0"
        >
          Tab to me to see the focus ring
        </a>
      </p>

      <h5 class="mt-4">Colored focus rings</h5>
      <p>
        <a
          href="#"
          class="focus-ring focus-ring-primary px-2 link-underline-opacity-0 link-underline"
          >Primary ring</a
        >
      </p>
      <p>
        <a
          href="#"
          class="focus-ring focus-ring-success px-2 link-underline-opacity-0 link-underline"
          >Success ring</a
        >
      </p>
      <p>
        <a
          href="#"
          class="focus-ring focus-ring-danger px-2 link-underline-opacity-0 link-underline"
          >Danger ring</a
        >
      </p>

      <h5 class="mt-4">Custom ring via CSS variables</h5>
      <p>
        <a
          href="#"
          class="focus-ring px-2 link-underline link-underline-opacity-0"
          style="
            --bs-focus-ring-width: 0.25rem;
            --bs-focus-ring-offset: 0.25rem;
            --bs-focus-ring-color: rgba(111, 66, 193, 0.5);
          "
        >
          Thick offset purple ring
        </a>
      </p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
