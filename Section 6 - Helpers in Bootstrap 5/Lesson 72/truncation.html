<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>In a grid column</h5>
      <div class="row">
        <div class="col-3 text-truncate bg-light border">
          This is a long text that will be truncated with an ellipsis because it
          does not fit.
        </div>
      </div>

      <h5 class="mt-4">On an inline-block span with max-width</h5>
      <span
        class="d-inline-block text-truncate bg-light border"
        style="max-width: 150px"
      >
        This is a long text that will be truncated with an ellipsis.
      </span>

      <h5 class="mt-4">Without truncate (compare)</h5>
      <div class="row">
        <div class="col-3 bg-light border">
          This is a long text that will simply wrap onto multiple lines instead.
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
