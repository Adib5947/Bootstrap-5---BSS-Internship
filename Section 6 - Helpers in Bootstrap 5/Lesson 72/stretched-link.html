<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>Whole card is clickable</h5>
      <div class="card mb-4" style="width: 18rem">
        <svg
          class="card-img-top"
          width="100%"
          height="120"
          xmlns="http://www.w3.org/2000/svg"
          role="img"
          preserveAspectRatio="xMidYMid slice"
          focusable="false"
        >
          <rect width="100%" height="100%" fill="#6c757d"></rect>
        </svg>
        <div class="card-body">
          <h5 class="card-title">Card with stretched link</h5>
          <p class="card-text">
            Hover anywhere on this card — the entire card is the link target.
          </p>
          <a href="#" class="btn btn-primary stretched-link">Go somewhere</a>
        </div>
      </div>

      <h5>Custom container needs .position-relative</h5>
      <div
        class="d-flex position-relative bg-light border p-3"
        style="max-width: 30rem"
      >
        <svg
          width="120"
          height="120"
          xmlns="http://www.w3.org/2000/svg"
          class="flex-shrink-0 me-3"
          role="img"
          focusable="false"
        >
          <rect width="100%" height="100%" fill="#0d6efd"></rect>
        </svg>
        <div>
          <h5>
            <a href="#" class="stretched-link">Whole flex box is clickable</a>
          </h5>
          <p>
            Because the wrapper has .position-relative, the stretched link
            covers all of it.
          </p>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
