<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">

      <h5>Inline</h5>
      <p>Some text <div class="vr"></div> more text</p>

      <h5 class="mt-4">In a flex container (stretches to tallest item)</h5>
      <div class="d-flex bg-light border p-3" style="height: 100px">
        <div>Left side</div>
        <div class="vr mx-3"></div>
        <div>Right side</div>
      </div>

      <h5 class="mt-4">In an hstack (the common combo)</h5>
      <div class="hstack gap-3">
        <button class="btn btn-outline-primary">One</button>
        <div class="vr"></div>
        <button class="btn btn-outline-primary">Two</button>
        <div class="vr"></div>
        <button class="btn btn-outline-primary">Three</button>
      </div>

      <h5 class="mt-4">Custom height & color</h5>
      <div class="vr text-danger" style="height: 80px"></div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
