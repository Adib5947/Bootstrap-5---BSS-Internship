<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5.3</title>
    <!-- Bootstrap 5.3 update lesson: uses the 5.3 CDN + Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>Basic icon link</h5>
      <p>
        <a class="icon-link" href="#">
          <i class="bi bi-box-arrow-up-right"></i>
          Icon link
        </a>
      </p>

      <h5 class="mt-4">Hover animation (icon slides on hover)</h5>
      <p>
        <a class="icon-link icon-link-hover" href="#">
          Icon link with hover effect
          <i class="bi bi-arrow-right"></i>
        </a>
      </p>

      <h5 class="mt-4">Custom hover transform</h5>
      <p>
        <a
          class="icon-link icon-link-hover"
          style="--bs-icon-link-transform: translate3d(0, -0.2rem, 0)"
          href="#"
        >
          Icon moves UP on hover
          <i class="bi bi-arrow-up-circle"></i>
        </a>
      </p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
