<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>vstack with gap</h5>
      <div class="vstack gap-3 mb-4">
        <div class="bg-light border p-2">First item</div>
        <div class="bg-light border p-2">Second item</div>
        <div class="bg-light border p-2">Third item</div>
      </div>

      <h5>hstack with gap</h5>
      <div class="hstack gap-3 mb-4">
        <div class="bg-light border p-2">First item</div>
        <div class="bg-light border p-2">Second item</div>
        <div class="bg-light border p-2">Third item</div>
      </div>

      <h5>hstack with ms-auto and a vertical rule</h5>
      <div class="hstack gap-3 mb-4">
        <div class="bg-light border p-2">Item</div>
        <div class="bg-light border p-2 ms-auto">Pushed right (ms-auto)</div>
        <div class="vr"></div>
        <div class="bg-light border p-2">After the divider</div>
      </div>

      <h5>Practical: inline form with hstack</h5>
      <div class="hstack gap-3">
        <input
          class="form-control me-auto"
          type="text"
          placeholder="Add your item here..."
        />
        <button type="button" class="btn btn-secondary">Submit</button>
        <div class="vr"></div>
        <button type="button" class="btn btn-outline-danger">Reset</button>
      </div>

      <h5 class="mt-4">Practical: button stack</h5>
      <div class="vstack gap-2 col-md-5 mx-auto">
        <button type="button" class="btn btn-secondary">Save changes</button>
        <button type="button" class="btn btn-outline-secondary">Cancel</button>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
