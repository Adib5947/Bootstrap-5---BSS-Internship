<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>16x9 embed (resize the window — it stays 16:9)</h5>
      <div class="ratio ratio-16x9 mb-4">
        <iframe
          src="https://www.youtube-nocookie.com/embed/zpOULjyy-n8?rel=0"
          title="YouTube video"
          allowfullscreen
        ></iframe>
      </div>

      <h5>All ratios compared</h5>
      <div class="row">
        <div class="col-3">
          <div class="ratio ratio-1x1 text-bg-secondary">
            <div class="d-flex align-items-center justify-content-center">
              1x1
            </div>
          </div>
        </div>
        <div class="col-3">
          <div class="ratio ratio-4x3 text-bg-secondary">
            <div class="d-flex align-items-center justify-content-center">
              4x3
            </div>
          </div>
        </div>
        <div class="col-3">
          <div class="ratio ratio-16x9 text-bg-secondary">
            <div class="d-flex align-items-center justify-content-center">
              16x9
            </div>
          </div>
        </div>
        <div class="col-3">
          <div class="ratio ratio-21x9 text-bg-secondary">
            <div class="d-flex align-items-center justify-content-center">
              21x9
            </div>
          </div>
        </div>
      </div>

      <h5 class="mt-4">Custom ratio via CSS variable</h5>
      <div
        class="ratio text-bg-info"
        style="--bs-aspect-ratio: 50%; max-width: 300px"
      >
        <div class="d-flex align-items-center justify-content-center">
          2x1 (50%)
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
