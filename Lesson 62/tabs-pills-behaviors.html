<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>Tabs switching content</h5>
      <ul class="nav nav-tabs" id="myTab" role="tablist">
        <li class="nav-item" role="presentation">
          <button
            class="nav-link active"
            id="home-tab"
            data-bs-toggle="tab"
            data-bs-target="#home-pane"
            type="button"
            role="tab"
            aria-controls="home-pane"
            aria-selected="true"
          >
            Home
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button
            class="nav-link"
            id="profile-tab"
            data-bs-toggle="tab"
            data-bs-target="#profile-pane"
            type="button"
            role="tab"
            aria-controls="profile-pane"
            aria-selected="false"
          >
            Profile
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button
            class="nav-link"
            id="contact-tab"
            data-bs-toggle="tab"
            data-bs-target="#contact-pane"
            type="button"
            role="tab"
            aria-controls="contact-pane"
            aria-selected="false"
          >
            Contact
          </button>
        </li>
      </ul>
      <div class="tab-content border border-top-0 p-3" id="myTabContent">
        <div
          class="tab-pane fade show active"
          id="home-pane"
          role="tabpanel"
          aria-labelledby="home-tab"
        >
          <p>
            Home tab content. This pane is visible by default (show active).
          </p>
        </div>
        <div
          class="tab-pane fade"
          id="profile-pane"
          role="tabpanel"
          aria-labelledby="profile-tab"
        >
          <p>Profile tab content.</p>
        </div>
        <div
          class="tab-pane fade"
          id="contact-pane"
          role="tabpanel"
          aria-labelledby="contact-tab"
        >
          <p>Contact tab content.</p>
        </div>
      </div>

      <h5 class="mt-5">Vertical pills switching content</h5>
      <div class="d-flex align-items-start">
        <div
          class="nav flex-column nav-pills me-3"
          id="vPills"
          role="tablist"
          aria-orientation="vertical"
        >
          <button
            class="nav-link active"
            id="v-one-tab"
            data-bs-toggle="pill"
            data-bs-target="#v-one"
            type="button"
            role="tab"
            aria-controls="v-one"
            aria-selected="true"
          >
            Section 1
          </button>
          <button
            class="nav-link"
            id="v-two-tab"
            data-bs-toggle="pill"
            data-bs-target="#v-two"
            type="button"
            role="tab"
            aria-controls="v-two"
            aria-selected="false"
          >
            Section 2
          </button>
        </div>
        <div class="tab-content" id="vPillsContent">
          <div
            class="tab-pane fade show active"
            id="v-one"
            role="tabpanel"
            aria-labelledby="v-one-tab"
          >
            <p>Vertical pill content one.</p>
          </div>
          <div
            class="tab-pane fade"
            id="v-two"
            role="tabpanel"
            aria-labelledby="v-two-tab"
          >
            <p>Vertical pill content two.</p>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
