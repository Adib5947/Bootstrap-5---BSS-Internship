<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5.3</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>New 5.3 markup</h5>
      <div
        class="progress mb-2"
        role="progressbar"
        aria-label="Basic example"
        aria-valuenow="50"
        aria-valuemin="0"
        aria-valuemax="100"
      >
        <div class="progress-bar" style="width: 50%"></div>
      </div>

      <h5 class="mt-4">With label, color, stripes — same idea</h5>
      <div
        class="progress mb-2"
        role="progressbar"
        aria-label="Success striped example"
        aria-valuenow="75"
        aria-valuemin="0"
        aria-valuemax="100"
      >
        <div
          class="progress-bar progress-bar-striped progress-bar-animated bg-success"
          style="width: 75%"
        >
          75%
        </div>
      </div>

      <h5 class="mt-4">
        Stacked bars (5.3): each segment is its own .progress in
        .progress-stacked
      </h5>
      <div class="progress-stacked">
        <div
          class="progress"
          role="progressbar"
          aria-label="Segment one"
          aria-valuenow="15"
          aria-valuemin="0"
          aria-valuemax="100"
          style="width: 15%"
        >
          <div class="progress-bar"></div>
        </div>
        <div
          class="progress"
          role="progressbar"
          aria-label="Segment two"
          aria-valuenow="30"
          aria-valuemin="0"
          aria-valuemax="100"
          style="width: 30%"
        >
          <div class="progress-bar bg-success"></div>
        </div>
        <div
          class="progress"
          role="progressbar"
          aria-label="Segment three"
          aria-valuenow="20"
          aria-valuemin="0"
          aria-valuemax="100"
          style="width: 20%"
        >
          <div class="progress-bar bg-info"></div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
