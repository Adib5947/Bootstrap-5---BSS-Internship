<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5.3</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>Label inside the bar</h5>
      <div
        class="progress mb-2"
        role="progressbar"
        aria-label="With label"
        aria-valuenow="25"
        aria-valuemin="0"
        aria-valuemax="100"
      >
        <div class="progress-bar" style="width: 25%">25%</div>
      </div>

      <h5 class="mt-4">Long label overflowing a small bar</h5>
      <div
        class="progress mb-2"
        role="progressbar"
        aria-label="Overflowing label"
        aria-valuenow="10"
        aria-valuemin="0"
        aria-valuemax="100"
      >
        <div class="progress-bar overflow-visible text-dark" style="width: 10%">
          Long label text for the progress bar, set to a dark color
        </div>
      </div>

      <h5 class="mt-4">Backgrounds (watch label contrast!)</h5>
      <div
        class="progress mb-2"
        role="progressbar"
        aria-label="Success"
        aria-valuenow="25"
        aria-valuemin="0"
        aria-valuemax="100"
      >
        <div class="progress-bar bg-success" style="width: 25%">25%</div>
      </div>
      <div
        class="progress mb-2"
        role="progressbar"
        aria-label="Info"
        aria-valuenow="50"
        aria-valuemin="0"
        aria-valuemax="100"
      >
        <div class="progress-bar bg-info text-dark" style="width: 50%">50%</div>
      </div>
      <div
        class="progress mb-2"
        role="progressbar"
        aria-label="Warning"
        aria-valuenow="75"
        aria-valuemin="0"
        aria-valuemax="100"
      >
        <div class="progress-bar text-bg-warning" style="width: 75%">75%</div>
      </div>
      <div
        class="progress mb-2"
        role="progressbar"
        aria-label="Danger"
        aria-valuenow="100"
        aria-valuemin="0"
        aria-valuemax="100"
      >
        <div class="progress-bar bg-danger" style="width: 100%">100%</div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
