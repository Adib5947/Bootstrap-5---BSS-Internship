<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>Basic icons</h5>
      <i class="bi bi-house fs-2"></i>
      <i class="bi bi-heart fs-2"></i>
      <i class="bi bi-heart-fill fs-2"></i>
      <i class="bi bi-star fs-2"></i>
      <i class="bi bi-search fs-2"></i>
      <i class="bi bi-cart fs-2"></i>
      <i class="bi bi-person-circle fs-2"></i>
      <i class="bi bi-gear fs-2"></i>

      <h5 class="mt-4">Sized and colored with utilities</h5>
      <i class="bi bi-alarm fs-1 text-primary"></i>
      <i class="bi bi-alarm fs-2 text-success"></i>
      <i class="bi bi-alarm fs-3 text-danger"></i>
      <i class="bi bi-alarm fs-4 text-warning"></i>

      <h5 class="mt-4">In buttons</h5>
      <button type="button" class="btn btn-primary">
        <i class="bi bi-cart"></i> Add to cart
      </button>
      <button type="button" class="btn btn-outline-danger">
        <i class="bi bi-trash"></i> Delete
      </button>
      <button type="button" class="btn btn-success">
        Download <i class="bi bi-download"></i>
      </button>

      <h5 class="mt-4">In alerts and inputs</h5>
      <div class="alert alert-warning d-flex align-items-center" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <div>A warning alert with an icon.</div>
      </div>
      <div class="input-group" style="max-width: 300px">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input type="text" class="form-control" placeholder="Search" />
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
