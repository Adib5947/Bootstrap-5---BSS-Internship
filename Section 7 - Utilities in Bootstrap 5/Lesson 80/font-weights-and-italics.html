<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <p class="fw-bold">.fw-bold</p>
      <p class="fw-bolder">.fw-bolder (relative to parent)</p>
      <p class="fw-semibold">.fw-semibold</p>
      <p class="fw-normal">.fw-normal</p>
      <p class="fw-light">.fw-light</p>
      <p class="fw-lighter">.fw-lighter (relative to parent)</p>
      <p class="fst-italic">.fst-italic</p>
      <p class="fst-normal">.fst-normal</p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
