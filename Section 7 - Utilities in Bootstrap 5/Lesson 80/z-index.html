<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5.3</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <div class="position-relative" style="height: 220px">
        <div
          class="z-3 position-absolute p-5 rounded-3 bg-primary text-white"
          style="top: 0; left: 0"
        >
          z-3
        </div>
        <div
          class="z-2 position-absolute p-5 rounded-3 bg-success text-white"
          style="top: 30px; left: 50px"
        >
          z-2
        </div>
        <div
          class="z-1 position-absolute p-5 rounded-3 bg-danger text-white"
          style="top: 60px; left: 100px"
        >
          z-1
        </div>
        <div
          class="z-0 position-absolute p-5 rounded-3 bg-dark text-white"
          style="top: 90px; left: 150px"
        >
          z-0
        </div>
        <div
          class="z-n1 position-absolute p-5 rounded-3 bg-warning"
          style="top: 120px; left: 200px"
        >
          z-n1
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
