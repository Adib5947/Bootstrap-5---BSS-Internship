<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <div class="p-3 mb-2 bg-success text-white">
        bg-success (default opacity)
      </div>
      <div class="p-3 mb-2 bg-success bg-opacity-75 text-white">
        bg-opacity-75
      </div>
      <div class="p-3 mb-2 bg-success bg-opacity-50 text-dark">
        bg-opacity-50
      </div>
      <div class="p-3 mb-2 bg-success bg-opacity-25 text-dark">
        bg-opacity-25
      </div>
      <div class="p-3 mb-2 bg-success bg-opacity-10 text-dark">
        bg-opacity-10
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
