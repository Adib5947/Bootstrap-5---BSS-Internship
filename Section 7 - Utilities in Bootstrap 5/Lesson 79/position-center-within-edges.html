<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <div class="position-relative bg-light border" style="height: 220px">
        <div
          class="position-absolute top-0 start-50 translate-middle-x bg-primary text-white p-2"
        >
          top edge, centered x
        </div>
        <div
          class="position-absolute top-50 start-0 translate-middle-y bg-secondary text-white p-2"
        >
          left edge, centered y
        </div>
        <div
          class="position-absolute top-50 end-0 translate-middle-y bg-success text-white p-2"
        >
          right edge, centered y
        </div>
        <div
          class="position-absolute bottom-0 start-50 translate-middle-x bg-dark text-white p-2"
        >
          bottom edge, centered x
        </div>
        <div
          class="position-absolute top-0 start-0 translate-middle bg-danger text-white p-2"
        >
          corner, translate-middle
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
