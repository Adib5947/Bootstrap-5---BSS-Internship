<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>Notification badge on a button</h5>
      <button type="button" class="btn btn-primary position-relative me-5 mb-5">
        Mails
        <span
          class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-secondary"
        >
          +99
          <span class="visually-hidden">unread messages</span>
        </span>
      </button>
      <h5 class="mt-4">Indicator dot</h5>
      <button type="button" class="btn btn-primary position-relative me-5 mb-5">
        Alerts
        <span
          class="position-absolute top-0 start-100 translate-middle p-2 bg-danger border border-light rounded-circle"
        >
          <span class="visually-hidden">New alerts</span>
        </span>
      </button>
      <h5 class="mt-4">Badge on an avatar</h5>
      <div class="position-relative d-inline-block">
        <svg
          width="64"
          height="64"
          xmlns="http://www.w3.org/2000/svg"
          class="rounded"
          role="img"
          focusable="false"
        >
          <rect width="100%" height="100%" fill="#6c757d"></rect>
        </svg>
        <span
          class="position-absolute bottom-0 end-0 p-2 bg-success border border-light rounded-circle"
        >
          <span class="visually-hidden">Online</span>
        </span>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
