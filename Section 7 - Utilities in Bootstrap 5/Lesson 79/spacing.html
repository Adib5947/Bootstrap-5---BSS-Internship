<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>Margin</h5>
      <div class="bg-light border mb-4">
        <div class="m-0 p-2 bg-primary text-white d-inline-block">m-0</div>
        <div class="m-2 p-2 bg-primary text-white d-inline-block">m-2</div>
        <div class="m-4 p-2 bg-primary text-white d-inline-block">m-4</div>
        <div class="mt-5 ms-5 p-2 bg-secondary text-white d-inline-block">
          mt-5 ms-5
        </div>
        <div class="mx-3 my-1 p-2 bg-dark text-white d-inline-block">
          mx-3 my-1
        </div>
      </div>
      <h5>Padding</h5>
      <div class="d-flex flex-wrap gap-3 mb-4">
        <div class="p-0 bg-light border">p-0</div>
        <div class="p-2 bg-light border">p-2</div>
        <div class="p-4 bg-light border">p-4</div>
        <div class="px-5 py-1 bg-light border">px-5 py-1</div>
        <div class="pt-4 pe-2 bg-light border">pt-4 pe-2</div>
      </div>
      <h5>Horizontal centering with mx-auto</h5>
      <div class="mx-auto p-2 bg-warning" style="width: 200px">mx-auto</div>
      <h5 class="mt-4">Negative margin</h5>
      <div class="bg-light border p-3">
        <div class="mt-n3 p-2 bg-danger text-white d-inline-block">
          mt-n3 pulls up (needs $enable-negative-margins in Sass; shown for
          reference)
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
