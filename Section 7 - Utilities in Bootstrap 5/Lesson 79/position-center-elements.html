<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>top-50 start-50 alone (top-left corner lands at center)</h5>
      <div class="position-relative bg-light border mb-4" style="height: 150px">
        <div
          class="position-absolute top-50 start-50 bg-secondary text-white p-2"
        >
          not truly centered
        </div>
      </div>
      <h5>+ translate-middle (truly centered)</h5>
      <div class="position-relative bg-light border" style="height: 150px">
        <div
          class="position-absolute top-50 start-50 translate-middle bg-primary text-white p-2"
        >
          perfectly centered
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
