<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <div class="position-relative bg-light border" style="height: 200px">
        <div class="position-absolute top-0 start-0 bg-primary text-white p-2">
          top-0 start-0
        </div>
        <div class="position-absolute top-0 end-0 bg-secondary text-white p-2">
          top-0 end-0
        </div>
        <div
          class="position-absolute top-50 start-50 bg-success text-white p-2"
        >
          top-50 start-50
        </div>
        <div
          class="position-absolute bottom-0 start-0 bg-danger text-white p-2"
        >
          bottom-0 start-0
        </div>
        <div class="position-absolute bottom-0 end-0 bg-dark text-white p-2">
          bottom-0 end-0
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
