<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>Widths</h5>
      <div class="w-25 p-2 bg-light border">w-25</div>
      <div class="w-50 p-2 bg-light border">w-50</div>
      <div class="w-75 p-2 bg-light border">w-75</div>
      <div class="w-100 p-2 bg-light border">w-100</div>
      <div class="w-auto p-2 bg-light border">w-auto</div>
      <h5 class="mt-4">Heights</h5>
      <div class="bg-light border" style="height: 120px">
        <div class="h-25 d-inline-block bg-primary" style="width: 60px"></div>
        <div class="h-50 d-inline-block bg-secondary" style="width: 60px"></div>
        <div class="h-75 d-inline-block bg-success" style="width: 60px"></div>
        <div class="h-100 d-inline-block bg-dark" style="width: 60px"></div>
      </div>
      <h5 class="mt-4">Viewport sizing</h5>
      <div class="min-vw-100 bg-info p-2">min-vw-100 (full viewport width)</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
