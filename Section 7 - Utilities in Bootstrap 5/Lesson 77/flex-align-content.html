<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>align-content-start</h5>
      <div
        class="d-flex align-content-start flex-wrap bg-light border mb-3"
        style="height: 180px; width: 350px"

        <div class="p-2 bg-primary text-white m-1">item</div>
        <div class="p-2 bg-secondary text-white m-1">item</div>
        <div class="p-2 bg-dark text-white m-1">item</div>
        <div class="p-2 bg-primary text-white m-1">item</div>
        <div class="p-2 bg-secondary text-white m-1">item</div>
        <div class="p-2 bg-dark text-white m-1">item</div>
      </div>
      <h5>align-content-center</h5>
      <div
        class="d-flex align-content-center flex-wrap bg-light border mb-3"
        style="height: 180px; width: 350px"
      >
        <div class="p-2 bg-primary text-white m-1">item</div>
        <div class="p-2 bg-secondary text-white m-1">item</div>
        <div class="p-2 bg-dark text-white m-1">item</div>
        <div class="p-2 bg-primary text-white m-1">item</div>
        <div class="p-2 bg-secondary text-white m-1">item</div>
        <div class="p-2 bg-dark text-white m-1">item</div>
      </div>
      <h5>align-content-end</h5>
      <div
        class="d-flex align-content-end flex-wrap bg-light border mb-3"
        style="height: 180px; width: 350px"
      >
        <div class="p-2 bg-primary text-white m-1">item</div>
        <div class="p-2 bg-secondary text-white m-1">item</div>
        <div class="p-2 bg-dark text-white m-1">item</div>
        <div class="p-2 bg-primary text-white m-1">item</div>
        <div class="p-2 bg-secondary text-white m-1">item</div>
        <div class="p-2 bg-dark text-white m-1">item</div>
      </div>
      <h5>align-content-between</h5>
      <div
        class="d-flex align-content-between flex-wrap bg-light border"
        style="height: 180px; width: 350px"
      >
        <div class="p-2 bg-primary text-white m-1">item</div>
        <div class="p-2 bg-secondary text-white m-1">item</div>
        <div class="p-2 bg-dark text-white m-1">item</div>
        <div class="p-2 bg-primary text-white m-1">item</div>
        <div class="p-2 bg-secondary text-white m-1">item</div>
        <div class="p-2 bg-dark text-white m-1">item</div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
