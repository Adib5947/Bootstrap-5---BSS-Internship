<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>mb-auto pushes siblings down (flex-column + align-items)</h5>
      <div
        class="d-flex align-items-start flex-column bg-light border mb-3"
        style="height: 200px"
      >
        <div class="mb-auto p-2 bg-primary text-white">mb-auto</div>
        <div class="p-2 bg-secondary text-white">item</div>
        <div class="p-2 bg-dark text-white">item</div>
      </div>
      <h5>mt-auto pushes itself down</h5>
      <div
        class="d-flex align-items-end flex-column bg-light border"
        style="height: 200px"
      >
        <div class="p-2 bg-primary text-white">item</div>
        <div class="p-2 bg-secondary text-white">item</div>
        <div class="mt-auto p-2 bg-dark text-white">mt-auto</div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
