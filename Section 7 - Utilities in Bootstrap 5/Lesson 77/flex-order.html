<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <div class="d-flex flex-nowrap bg-light border">
        <div class="order-3 p-2 bg-primary text-white">
          First in HTML, order-3
        </div>
        <div class="order-2 p-2 bg-secondary text-white">
          Second in HTML, order-2
        </div>
        <div class="order-1 p-2 bg-dark text-white">Third in HTML, order-1</div>
      </div>
      <div class="d-flex flex-nowrap bg-light border mt-3">
        <div class="order-last p-2 bg-primary text-white">order-last</div>
        <div class="p-2 bg-secondary text-white">no order</div>
        <div class="order-first p-2 bg-dark text-white">order-first</div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
