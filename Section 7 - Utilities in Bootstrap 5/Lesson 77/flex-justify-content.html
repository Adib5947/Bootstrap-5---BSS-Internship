<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>justify-content-start</h5>
      <div class="d-flex justify-content-start bg-light border mb-3">
        <div class="p-2 bg-primary text-white">1</div>
        <div class="p-2 bg-secondary text-white">2</div>
        <div class="p-2 bg-dark text-white">3</div>
      </div>
      <h5>justify-content-end</h5>
      <div class="d-flex justify-content-end bg-light border mb-3">
        <div class="p-2 bg-primary text-white">1</div>
        <div class="p-2 bg-secondary text-white">2</div>
        <div class="p-2 bg-dark text-white">3</div>
      </div>
      <h5>justify-content-center</h5>
      <div class="d-flex justify-content-center bg-light border mb-3">
        <div class="p-2 bg-primary text-white">1</div>
        <div class="p-2 bg-secondary text-white">2</div>
        <div class="p-2 bg-dark text-white">3</div>
      </div>
      <h5>justify-content-between</h5>
      <div class="d-flex justify-content-between bg-light border mb-3">
        <div class="p-2 bg-primary text-white">1</div>
        <div class="p-2 bg-secondary text-white">2</div>
        <div class="p-2 bg-dark text-white">3</div>
      </div>
      <h5>justify-content-around</h5>
      <div class="d-flex justify-content-around bg-light border mb-3">
        <div class="p-2 bg-primary text-white">1</div>
        <div class="p-2 bg-secondary text-white">2</div>
        <div class="p-2 bg-dark text-white">3</div>
      </div>
      <h5>justify-content-evenly</h5>
      <div class="d-flex justify-content-evenly bg-light border">
        <div class="p-2 bg-primary text-white">1</div>
        <div class="p-2 bg-secondary text-white">2</div>
        <div class="p-2 bg-dark text-white">3</div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
