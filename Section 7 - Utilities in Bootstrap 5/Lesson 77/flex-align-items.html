<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>align-items-start</h5>
      <div
        class="d-flex align-items-start bg-light border mb-3"
        style="height: 100px"
      >
        <div class="p-2 bg-primary text-white">1</div>
        <div class="p-2 bg-secondary text-white">2</div>
        <div class="p-2 bg-dark text-white">3</div>
      </div>
      <h5>align-items-end</h5>
      <div
        class="d-flex align-items-end bg-light border mb-3"
        style="height: 100px"
      >
        <div class="p-2 bg-primary text-white">1</div>
        <div class="p-2 bg-secondary text-white">2</div>
        <div class="p-2 bg-dark text-white">3</div>
      </div>
      <h5>align-items-center</h5>
      <div
        class="d-flex align-items-center bg-light border mb-3"
        style="height: 100px"
      >
        <div class="p-2 bg-primary text-white">1</div>
        <div class="p-2 bg-secondary text-white">2</div>
        <div class="p-2 bg-dark text-white">3</div>
      </div>
      <h5>align-items-baseline</h5>
      <div
        class="d-flex align-items-baseline bg-light border mb-3"
        style="height: 100px"
      >
        <div class="p-2 bg-primary text-white fs-1">1</div>
        <div class="p-2 bg-secondary text-white">2</div>
        <div class="p-2 bg-dark text-white fs-5">3</div>
      </div>
      <h5>align-items-stretch (default)</h5>
      <div
        class="d-flex align-items-stretch bg-light border"
        style="height: 100px"
      >
        <div class="p-2 bg-primary text-white">1</div>
        <div class="p-2 bg-secondary text-white">2</div>
        <div class="p-2 bg-dark text-white">3</div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
