<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <div class="d-flex bg-light border" style="height: 120px">
        <div class="p-2 bg-secondary text-white">normal</div>
        <div class="p-2 bg-primary text-white align-self-start">
          align-self-start
        </div>
        <div class="p-2 bg-success text-white align-self-center">
          align-self-center
        </div>
        <div class="p-2 bg-danger text-white align-self-end">
          align-self-end
        </div>
        <div class="p-2 bg-dark text-white align-self-stretch">
          align-self-stretch
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
