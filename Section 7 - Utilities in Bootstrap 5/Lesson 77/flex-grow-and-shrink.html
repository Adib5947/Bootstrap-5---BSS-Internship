<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>flex-grow-1</h5>
      <div class="d-flex bg-light border mb-3">
        <div class="flex-grow-1 p-2 bg-primary text-white">flex-grow-1</div>
        <div class="p-2 bg-secondary text-white">second</div>
        <div class="p-2 bg-dark text-white">third</div>
      </div>
      <h5>flex-shrink-1 vs flex-shrink-0</h5>
      <div class="d-flex bg-light border">
        <div class="p-2 w-100 bg-primary text-white">w-100 pushes</div>
        <div class="flex-shrink-1 p-2 bg-secondary text-white">
          flex-shrink-1 gives way
        </div>
        <div class="flex-shrink-0 p-2 bg-dark text-white">
          flex-shrink-0 refuses to shrink
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
