<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <div class="d-flex mb-4">
        <div class="flex-shrink-0">
          <svg
            width="80"
            height="80"
            xmlns="http://www.w3.org/2000/svg"
            role="img"
            focusable="false"
          >
            <rect width="100%" height="100%" fill="#6c757d"></rect>
          </svg>
        </div>
        <div class="flex-grow-1 ms-3">
          <h5>Media object</h5>
          <p>
            Image on the left, content that grows on the right. This is the
            classic media object pattern built only with flex utilities.
          </p>
        </div>
      </div>
      <div class="d-flex align-items-center">
        <div class="flex-shrink-0">
          <svg
            width="80"
            height="80"
            xmlns="http://www.w3.org/2000/svg"
            role="img"
            focusable="false"
          >
            <rect width="100%" height="100%" fill="#0d6efd"></rect>
          </svg>
        </div>
        <div class="flex-grow-1 ms-3">
          Vertically centered variant using align-items-center.
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
