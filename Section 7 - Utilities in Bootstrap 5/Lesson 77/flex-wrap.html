<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>flex-nowrap (overflows)</h5>
      <div class="d-flex flex-nowrap bg-light border mb-3" style="width: 300px">
        <div class="p-2 bg-primary text-white">item</div>
        <div class="p-2 bg-secondary text-white">item</div>
        <div class="p-2 bg-dark text-white">item</div>
        <div class="p-2 bg-primary text-white">item</div>
        <div class="p-2 bg-secondary text-white">item</div>
        <div class="p-2 bg-dark text-white">item</div>
      </div>
      <h5>flex-wrap</h5>
      <div class="d-flex flex-wrap bg-light border mb-3" style="width: 300px">
        <div class="p-2 bg-primary text-white">item</div>
        <div class="p-2 bg-secondary text-white">item</div>
        <div class="p-2 bg-dark text-white">item</div>
        <div class="p-2 bg-primary text-white">item</div>
        <div class="p-2 bg-secondary text-white">item</div>
        <div class="p-2 bg-dark text-white">item</div>
      </div>
      <h5>flex-wrap-reverse</h5>
      <div
        class="d-flex flex-wrap-reverse bg-light border"
        style="width: 300px"
      >
        <div class="p-2 bg-primary text-white">item</div>
        <div class="p-2 bg-secondary text-white">item</div>
        <div class="p-2 bg-dark text-white">item</div>
        <div class="p-2 bg-primary text-white">item</div>
        <div class="p-2 bg-secondary text-white">item</div>
        <div class="p-2 bg-dark text-white">item</div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
