<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5.3</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <div class="d-flex flex-wrap gap-3">
        <div>
          <p class="mb-1">object-fit-contain</p>
          <svg
            class="object-fit-contain border"
            width="140"
            height="120"
            xmlns="http://www.w3.org/2000/svg"
            role="img"
            preserveAspectRatio="xMidYMid slice"
            focusable="false"
          >
            <rect width="100%" height="100%" fill="#868e96"></rect>
            <text x="50%" y="50%" fill="#fff" text-anchor="middle">16:9</text>
          </svg>
        </div>
        <div>
          <p class="mb-1">object-fit-cover</p>
          <svg
            class="object-fit-cover border"
            width="140"
            height="120"
            xmlns="http://www.w3.org/2000/svg"
            role="img"
            preserveAspectRatio="xMidYMid slice"
            focusable="false"
          >
            <rect width="100%" height="100%" fill="#0d6efd"></rect>
            <text x="50%" y="50%" fill="#fff" text-anchor="middle">16:9</text>
          </svg>
        </div>
        <div>
          <p class="mb-1">object-fit-fill</p>
          <svg
            class="object-fit-fill border"
            width="140"
            height="120"
            xmlns="http://www.w3.org/2000/svg"
            role="img"
            preserveAspectRatio="xMidYMid slice"
            focusable="false"
          >
            <rect width="100%" height="100%" fill="#198754"></rect>
            <text x="50%" y="50%" fill="#fff" text-anchor="middle">16:9</text>
          </svg>
        </div>
        <div>
          <p class="mb-1">object-fit-scale</p>
          <svg
            class="object-fit-scale border"
            width="140"
            height="120"
            xmlns="http://www.w3.org/2000/svg"
            role="img"
            preserveAspectRatio="xMidYMid slice"
            focusable="false"
          >
            <rect width="100%" height="100%" fill="#dc3545"></rect>
            <text x="50%" y="50%" fill="#fff" text-anchor="middle">16:9</text>
          </svg>
        </div>
        <div>
          <p class="mb-1">object-fit-none</p>
          <svg
            class="object-fit-none border"
            width="140"
            height="120"
            xmlns="http://www.w3.org/2000/svg"
            role="img"
            preserveAspectRatio="xMidYMid slice"
            focusable="false"
          >
            <rect width="100%" height="100%" fill="#212529"></rect>
            <text x="50%" y="50%" fill="#fff" text-anchor="middle">16:9</text>
          </svg>
        </div>
      </div>
      <p class="mt-3">
        Swap the svg elements for real img tags in your project to see the
        cropping behavior clearly.
      </p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
