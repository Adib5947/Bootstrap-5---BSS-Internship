<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5.3</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>Underline colors</h5>
      <p><a href="#" class="link-underline-primary">Primary underline</a></p>
      <p><a href="#" class="link-underline-success">Success underline</a></p>
      <p><a href="#" class="link-underline-danger">Danger underline</a></p>
      <h5 class="mt-4">Underline opacity</h5>
      <p>
        <a class="link-underline link-underline-opacity-0" href="#"
          >Underline opacity 0</a
        >
      </p>
      <p>
        <a class="link-underline link-underline-opacity-25" href="#"
          >Underline opacity 25</a
        >
      </p>
      <p>
        <a class="link-underline link-underline-opacity-75" href="#"
          >Underline opacity 75</a
        >
      </p>
      <p>
        <a
          class="link-underline link-underline-opacity-0 link-underline-opacity-100-hover"
          href="#"
          >Underline only on hover</a
        >
      </p>
      <h5 class="mt-4">Underline offset</h5>
      <p><a class="link-offset-1" href="#">Offset 1</a></p>
      <p><a class="link-offset-2" href="#">Offset 2</a></p>
      <p><a class="link-offset-3" href="#">Offset 3</a></p>
      <p><a class="link-offset-2-hover" href="#">Offset 2 on hover only</a></p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
