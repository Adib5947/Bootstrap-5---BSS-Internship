<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <div class="clearfix bg-light border p-2 mb-3">
        <button class="btn btn-primary float-start">float-start</button>
        <button class="btn btn-secondary float-end">float-end</button>
      </div>
      <div class="clearfix bg-light border p-2 mb-3">
        <button class="btn btn-success float-sm-start">float-sm-start</button>
      </div>
      <div class="clearfix bg-light border p-2 mb-3">
        <button class="btn btn-danger float-md-end">float-md-end</button>
      </div>
      <div class="clearfix bg-light border p-2">
        <button class="btn btn-dark float-lg-start float-none">
          float-lg-start (none below lg)
        </button>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
