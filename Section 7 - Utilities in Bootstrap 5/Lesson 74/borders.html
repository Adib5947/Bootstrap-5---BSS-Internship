<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>Additive</h5>
      <div class="d-flex flex-wrap gap-3 mb-4">
        <div class="border p-4 bg-light">border</div>
        <div class="border-top p-4 bg-light">border-top</div>
        <div class="border-end p-4 bg-light">border-end</div>
        <div class="border-bottom p-4 bg-light">border-bottom</div>
        <div class="border-start p-4 bg-light">border-start</div>
      </div>
      <h5>Subtractive</h5>
      <div class="d-flex flex-wrap gap-3">
        <div class="border border-0 p-4 bg-light">border-0</div>
        <div class="border border-top-0 p-4 bg-light">border-top-0</div>
        <div class="border border-end-0 p-4 bg-light">border-end-0</div>
        <div class="border border-bottom-0 p-4 bg-light">border-bottom-0</div>
        <div class="border border-start-0 p-4 bg-light">border-start-0</div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
