<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <div class="d-flex flex-wrap gap-3 align-items-start">
        <div class="rounded bg-secondary text-white p-4">rounded</div>
        <div class="rounded-top bg-secondary text-white p-4">rounded-top</div>
        <div class="rounded-end bg-secondary text-white p-4">rounded-end</div>
        <div class="rounded-bottom bg-secondary text-white p-4">
          rounded-bottom
        </div>
        <div class="rounded-start bg-secondary text-white p-4">
          rounded-start
        </div>
        <div
          class="rounded-circle bg-secondary text-white d-flex align-items-center justify-content-center"
          style="width: 100px; height: 100px"
        >
          circle
        </div>
        <div class="rounded-pill bg-secondary text-white px-4 py-2">
          rounded-pill
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
