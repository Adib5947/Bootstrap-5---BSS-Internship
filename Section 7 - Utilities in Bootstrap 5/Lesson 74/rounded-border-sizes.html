<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <div class="d-flex flex-wrap gap-3">
        <div class="rounded-0 bg-secondary text-white p-4">rounded-0</div>
        <div class="rounded-1 bg-secondary text-white p-4">rounded-1</div>
        <div class="rounded-2 bg-secondary text-white p-4">rounded-2</div>
        <div class="rounded-3 bg-secondary text-white p-4">rounded-3</div>
        <div class="rounded-4 bg-secondary text-white p-4">rounded-4</div>
        <div class="rounded-5 bg-secondary text-white p-4">rounded-5</div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
