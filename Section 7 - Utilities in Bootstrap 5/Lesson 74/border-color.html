<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <div class="d-flex flex-wrap gap-3">
        <div class="border border-primary p-4">primary</div>
        <div class="border border-secondary p-4">secondary</div>
        <div class="border border-success p-4">success</div>
        <div class="border border-danger p-4">danger</div>
        <div class="border border-warning p-4">warning</div>
        <div class="border border-info p-4">info</div>
        <div class="border border-light p-4">light</div>
        <div class="border border-dark p-4">dark</div>
        <div class="border border-white p-4 bg-dark text-white">white</div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
