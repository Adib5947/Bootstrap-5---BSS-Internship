<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>Divs forced inline</h5>
      <div class="d-inline p-2 bg-primary text-white">d-inline div</div>
      <div class="d-inline p-2 bg-dark text-white">d-inline div</div>
      <h5 class="mt-4">Spans forced block</h5>
      <span class="d-block p-2 bg-primary text-white">d-block span</span>
      <span class="d-block p-2 bg-dark text-white">d-block span</span>
      <h5 class="mt-4">d-inline-block</h5>
      <div
        class="d-inline-block p-2 bg-secondary text-white"
        style="width: 150px"
      >
        has width
      </div>
      <div
        class="d-inline-block p-2 bg-secondary text-white"
        style="width: 150px"
      >
        sits inline
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
