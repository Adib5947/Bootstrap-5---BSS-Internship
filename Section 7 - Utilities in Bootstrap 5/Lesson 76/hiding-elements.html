<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>Resize the browser window</h5>
      <div class="d-none d-md-block p-2 bg-success text-white mb-2">
        Hidden below md, visible from md up (d-none d-md-block)
      </div>
      <div class="d-md-none p-2 bg-danger text-white mb-2">
        Visible below md, hidden from md up (d-md-none)
      </div>
      <div class="d-none d-lg-block d-xl-none p-2 bg-info mb-2">
        Visible ONLY on lg (d-none d-lg-block d-xl-none)
      </div>
      <div class="d-none p-2 bg-dark text-white">d-none: never visible</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
