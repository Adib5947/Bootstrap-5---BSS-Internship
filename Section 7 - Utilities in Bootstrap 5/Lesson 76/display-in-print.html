<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <h5>Use Ctrl+P / print preview to test</h5>
      <div class="d-print-none p-2 bg-danger text-white mb-2">
        Visible on screen, hidden in print (d-print-none)
      </div>
      <div class="d-none d-print-block p-2 bg-light border mb-2">
        Hidden on screen, visible only in print (d-none d-print-block)
      </div>
      <div class="d-block d-print-inline p-2 bg-info mb-2">
        Block on screen, inline in print
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
