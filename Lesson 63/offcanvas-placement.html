<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap 5</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css"
    />
  </head>
  <body>
    <div class="container mt-3">
      <button
        class="btn btn-primary"
        data-bs-toggle="offcanvas"
        data-bs-target="#ocStart"
      >
        Start (left)
      </button>
      <button
        class="btn btn-primary"
        data-bs-toggle="offcanvas"
        data-bs-target="#ocEnd"
      >
        End (right)
      </button>
      <button
        class="btn btn-primary"
        data-bs-toggle="offcanvas"
        data-bs-target="#ocTop"
      >
        Top
      </button>
      <button
        class="btn btn-primary"
        data-bs-toggle="offcanvas"
        data-bs-target="#ocBottom"
      >
        Bottom
      </button>

      <div class="offcanvas offcanvas-start" tabindex="-1" id="ocStart">
        <div class="offcanvas-header">
          <h5 class="offcanvas-title">offcanvas-start</h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="offcanvas"
            aria-label="Close"
          ></button>
        </div>
        <div class="offcanvas-body"><p>Slides in from the left.</p></div>
      </div>

      <div class="offcanvas offcanvas-end" tabindex="-1" id="ocEnd">
        <div class="offcanvas-header">
          <h5 class="offcanvas-title">offcanvas-end</h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="offcanvas"
            aria-label="Close"
          ></button>
        </div>
        <div class="offcanvas-body"><p>Slides in from the right.</p></div>
      </div>

      <div class="offcanvas offcanvas-top" tabindex="-1" id="ocTop">
        <div class="offcanvas-header">
          <h5 class="offcanvas-title">offcanvas-top</h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="offcanvas"
            aria-label="Close"
          ></button>
        </div>
        <div class="offcanvas-body"><p>Slides down from the top.</p></div>
      </div>

      <div class="offcanvas offcanvas-bottom" tabindex="-1" id="ocBottom">
        <div class="offcanvas-header">
          <h5 class="offcanvas-title">offcanvas-bottom</h5>
          <button
            type="button"
            class="btn-close"
            data-bs-dismiss="offcanvas"
            aria-label="Close"
          ></button>
        </div>
        <div class="offcanvas-body"><p>Slides up from the bottom.</p></div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.5/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
